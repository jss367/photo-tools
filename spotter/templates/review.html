<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotter - Classify</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
  }

  /* ---------- Header ---------- */
  .header {
    background: #16213e;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #0f3460;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .stats { font-size: 13px; color: #a0a0a0; display: flex; gap: 14px; }
  .stats .stat { white-space: nowrap; }
  .stats .new-count { color: #4ecca3; }
  .stats .ref-count { color: #f0c040; }
  .stats .dis-count { color: #e74c3c; }
  .stats .accepted-count { color: #7ec8e3; }

  /* Model selector */
  .model-selector {
    background: #0f3460;
    color: #e0e0e0;
    border: 1px solid #1a3a6e;
    border-radius: 4px;
    padding: 5px 10px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  .model-selector:hover { border-color: #4ecca3; }
  .model-selector:focus { border-color: #4ecca3; }

  /* Gear icon links to /settings */
  .gear-link {
    color: #a0a0a0;
    font-size: 22px;
    padding: 4px 8px;
    line-height: 1;
    transition: color 0.15s;
    text-decoration: none;
  }
  .gear-link:hover { color: #fff; }

  /* ---------- Settings Panel (inline quick settings) ---------- */
  .settings-panel {
    display: none;
    background: #16213e;
    padding: 14px 24px;
    border-bottom: 1px solid #0f3460;
  }
  .settings-panel.open {
    display: flex;
    gap: 40px;
    align-items: center;
    flex-wrap: wrap;
  }
  .setting-group { display: flex; align-items: center; gap: 8px; }
  .setting-group label { font-size: 13px; color: #a0a0a0; white-space: nowrap; }
  .setting-group input[type=range] {
    width: 180px;
    accent-color: #4ecca3;
    cursor: pointer;
  }
  .setting-group .value {
    font-size: 13px;
    min-width: 48px;
    color: #e0e0e0;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Category Tabs ---------- */
  .tabs {
    display: flex;
    background: #16213e;
    padding: 0 24px;
    border-bottom: 1px solid #0f3460;
    overflow-x: auto;
  }
  .tab {
    padding: 11px 18px;
    cursor: pointer;
    font-size: 13px;
    color: #a0a0a0;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tab:hover { color: #fff; }
  .tab.active { color: #fff; border-bottom-color: #4ecca3; }
  .tab .count {
    margin-left: 6px;
    font-size: 11px;
    background: #0f3460;
    padding: 2px 7px;
    border-radius: 10px;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Batch Action Bar ---------- */
  .batch-bar {
    padding: 10px 24px;
    background: #1a1a2e;
    border-bottom: 1px solid #0f3460;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .batch-bar button {
    padding: 6px 18px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-batch-accept { background: #4ecca3; color: #1a1a2e; }
  .btn-batch-accept:hover { background: #3db890; }
  .btn-batch-accept:disabled { background: #2a5a4a; color: #555; cursor: default; }
  .batch-info { font-size: 13px; color: #a0a0a0; }

  /* ---------- Photo Grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-width, 420px), 1fr));
    gap: 16px;
    padding: 24px;
  }

  /* ---------- Photo Card ---------- */
  .card {
    background: #16213e;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #0f3460;
    transition: opacity 0.25s, transform 0.15s;
  }
  .card:hover { transform: translateY(-2px); }
  .card.accepted { opacity: 0.45; }
  .card.skipped { opacity: 0.25; }
  .card img {
    width: 100%;
    aspect-ratio: 3/2;
    object-fit: cover;
    display: block;
    background: #0f3460;
  }
  .card-body { padding: 12px 14px; }
  .card-filename {
    font-size: 12px;
    color: #777;
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Category badge */
  .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    margin-bottom: 8px;
    text-transform: capitalize;
  }
  .badge-new { background: #4ecca3; color: #1a1a2e; }
  .badge-refinement { background: #f0c040; color: #1a1a2e; }
  .badge-disagreement { background: #e74c3c; color: #fff; }

  /* Group badge */
  .badge-group {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    margin-bottom: 8px;
    margin-left: 6px;
    background: #0f3460;
    color: #7ec8e3;
  }

  /* Existing keywords */
  .card-existing {
    font-size: 13px;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .card-existing .label-prefix { color: #777; }
  .card-existing .label-value { color: #c0c0c0; }

  /* Arrow for refinement */
  .refinement-arrow {
    color: #f0c040;
    margin: 0 6px;
    font-size: 14px;
  }

  /* Prediction */
  .card-prediction {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #fff;
  }

  /* Confidence bar */
  .confidence-bar {
    height: 4px;
    background: #0f3460;
    border-radius: 2px;
    margin-bottom: 4px;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }
  .card-confidence {
    font-size: 12px;
    color: #777;
    margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
  }

  /* Card action buttons */
  .card-actions { display: flex; gap: 8px; }
  .card-actions button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-accept { background: #4ecca3; color: #1a1a2e; }
  .btn-accept:hover { background: #3db890; }
  .btn-skip { background: #2a2a3e; color: #a0a0a0; }
  .btn-skip:hover { background: #3a3a4e; }
  .btn-done {
    background: #0f3460;
    color: #4ecca3;
    cursor: default;
    text-transform: capitalize;
  }
  .btn-done.skipped-btn { color: #777; }

  /* Expand / collapse for group cards */
  .group-expand-btn {
    background: #0f3460;
    color: #7ec8e3;
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: background 0.15s;
  }
  .group-expand-btn:hover { background: #1a4a7e; }
  .group-members {
    display: none;
    margin-top: 8px;
    border-top: 1px solid #0f3460;
    padding-top: 8px;
  }
  .group-members.open { display: block; }
  .group-member-thumb {
    display: inline-block;
    width: 80px;
    height: 54px;
    object-fit: cover;
    border-radius: 4px;
    margin: 2px;
    border: 1px solid #0f3460;
  }
  .group-member-list {
    font-size: 12px;
    color: #777;
    margin-top: 4px;
    line-height: 1.6;
  }
  .group-member-list span {
    display: inline-block;
    background: #0f3460;
    padding: 1px 6px;
    border-radius: 3px;
    margin: 2px;
  }

  /* Individual predictions breakdown for groups */
  .individual-preds {
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
  }
  .individual-preds span {
    margin-right: 10px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 24px;
    color: #555;
    font-size: 15px;
  }

  /* Loading spinner */
  .loading {
    text-align: center;
    padding: 80px 24px;
    color: #555;
    font-size: 15px;
  }

  /* Keyboard shortcut hint */
  .kbd-hint {
    font-size: 11px;
    color: #555;
    margin-left: auto;
    white-space: nowrap;
  }
</style>
</head>
<body>

{% set active_page = 'classify' %}
{% include '_navbar.html' %}

<!-- Review Header -->
<div class="header">
  <div class="header-left">
    <h1 id="title">Classify</h1>
    <select class="model-selector" id="collectionSelector" onchange="switchCollection(this.value)">
      <option value="">Select a collection...</option>
    </select>
    <select class="model-selector" id="modelSelector" onchange="switchModel(this.value)" style="display:none;"></select>
  </div>
  <div class="header-right">
    <div class="stats" id="stats"></div>
  </div>
</div>

<!-- Inline Quick Settings Panel -->
<div class="settings-panel open" id="settingsPanel">
  <div class="setting-group">
    <label for="thumbSize">Thumbnail size:</label>
    <input type="range" id="thumbSize" min="200" max="800" step="20" value="400"
           oninput="updateThumbSize(this.value)">
    <span class="value" id="thumbSizeVal">400px</span>
  </div>
</div>

<!-- Photo Grid -->
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none;">
  Select a collection above to load photos.
</div>
<div class="loading" id="loading" style="display:none;">Loading photos...</div>

<script>
/* ---------- State ---------- */
var allData = { photos: [] };
var currentModel = '';
var currentCollectionId = null;
var thumbSize = 400;

/* ---------- Bootstrap ---------- */
loadCollections();

/* ---------- Collection Loading ---------- */
async function loadCollections() {
  try {
    var resp = await fetch('/api/collections');
    var collections = await resp.json();
    var sel = document.getElementById('collectionSelector');
    sel.innerHTML = '<option value="">Select a collection...</option>';
    collections.forEach(function(c) {
      sel.innerHTML += '<option value="' + c.id + '">' + escapeHtml(c.name) + '</option>';
    });

    // Show empty state initially
    document.getElementById('empty').style.display = 'block';
  } catch(e) {}
}

function switchCollection(id) {
  if (!id) {
    allData.photos = [];
    renderAll();
    document.getElementById('empty').style.display = 'block';
    document.getElementById('empty').textContent = 'Select a collection above to load photos.';
    return;
  }
  currentCollectionId = parseInt(id);
  loadCollectionPhotos(currentCollectionId);
}

async function loadCollectionPhotos(collectionId) {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('grid').innerHTML = '';

  try {
    var resp = await fetch('/api/collections/' + collectionId + '/photos?per_page=500');
    var data = await resp.json();
    allData.photos = data.photos || [];

    var sel = document.getElementById('collectionSelector');
    var name = sel.options[sel.selectedIndex].text;
    document.getElementById('title').textContent = 'Classify: ' + name;
    document.title = 'Spotter - Classify: ' + name;

    document.getElementById('loading').style.display = 'none';
    renderAll();
  } catch (err) {
    document.getElementById('loading').textContent = 'Error: ' + err.message;
  }
}

function switchModel(model) {
  currentModel = model;
  renderAll();
}

/* ---------- Render Helpers ---------- */
function renderAll() {
  renderStats();
  renderGrid();
}

function renderStats() {
  var el = document.getElementById('stats');
  el.innerHTML = '<span class="stat">' + allData.photos.length + ' photos</span>';
}

/* ---------- Grid Rendering ---------- */
function renderGrid() {
  var photos = allData.photos;
  var grid = document.getElementById('grid');
  var empty = document.getElementById('empty');

  if (photos.length === 0) {
    grid.innerHTML = '';
    if (currentCollectionId) {
      empty.textContent = 'No photos in this collection.';
    } else {
      empty.textContent = 'Select a collection above to load photos.';
    }
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.style.setProperty('--card-width', thumbSize + 20 + 'px');

  grid.innerHTML = photos.map(function(p) {
    return renderPhotoCard(p);
  }).join('');
}

function renderPhotoCard(p) {
  var thumbUrl = '/thumbnails/' + p.id + '.jpg';

  // Rating stars
  var stars = '';
  if (p.rating > 0) {
    for (var i = 0; i < p.rating; i++) stars += '&#9733;';
  }

  // Flag badge
  var flagHtml = '';
  if (p.flag === 'flagged') flagHtml = '<span class="badge badge-new">flagged</span>';
  else if (p.flag === 'rejected') flagHtml = '<span class="badge badge-disagreement">rejected</span>';

  // Timestamp
  var dateHtml = '';
  if (p.timestamp) {
    var d = p.timestamp.split('T')[0];
    dateHtml = '<div class="card-existing"><span class="label-prefix">' + d + '</span></div>';
  }

  return '<div class="card" data-id="' + p.id + '">' +
    '<img src="' + thumbUrl + '" loading="lazy" alt="' + escapeAttr(p.filename) + '">' +
    '<div class="card-body">' +
      '<div class="card-filename" title="' + escapeAttr(p.filename) + '">' + escapeHtml(p.filename) + '</div>' +
      flagHtml +
      dateHtml +
      (stars ? '<div class="card-prediction" style="color:#f0c040;font-size:14px;">' + stars + '</div>' : '') +
    '</div>' +
  '</div>';
}

/* ---------- Settings ---------- */
function updateThumbSize(val) {
  thumbSize = parseInt(val, 10);
  document.getElementById('thumbSizeVal').textContent = val + 'px';
  renderGrid();
}

/* ---------- Utilities ---------- */
function escapeHtml(str) {
  if (str == null) return '';
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(String(str)));
  return div.innerHTML;
}

function escapeAttr(str) {
  if (str == null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
</body>
</html>
